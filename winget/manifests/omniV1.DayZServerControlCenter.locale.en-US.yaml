ShortDescription: A local, beginner-friendly control center for setting up, running, and tuning a multi-map DayZ Expansion server.
Description: |-
  DayZ Server Control Center is a free, open-source, local web app (packaged as a
  Windows executable) for running and tuning a multi-map DayZ Expansion server. It
  binds to 127.0.0.1, exposes no public endpoint, and wraps only an allowlisted set
  of admin scripts. Features include a first-run setup wizard, a status dashboard,
  per-map start/stop/restart controls, guided editors for loot/AI/events and a
  mission builder, BattlEye RCON moderation, scheduled restarts, SteamCMD server and
  Workshop mod updates with an update checker, player history and killfeed from the
  .ADM logs, a crash watchdog, backups with restore, and redacted support reports.
